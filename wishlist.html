<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista dei desideri — Eco-Nomico</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="wishlist" data-theme="light">

    <div id="navbar-slot"></div>

    <main class="container py-4">
        <h1 class="section-title">❤️ La mia lista dei desideri</h1>
        <p class="text-muted-eco mb-4">
            Salva qui i prodotti che ti interessano per ritrovarli facilmente.
        </p>

        <div id="wishlist-guest" class="d-none text-center py-5">
            <p class="lead">Devi essere loggato per usare la lista dei desideri.</p>
            <a href="login.html" class="btn-eco">Accedi</a>
        </div>

        <div id="wishlist-empty" class="d-none text-center py-5">
            <p class="lead">La tua lista è vuota.</p>
            <a href="shop.html" class="btn-eco">Esplora lo shop</a>
        </div>

        <div id="wishlist-items" class="row g-4 d-none"></div>
    </main>

    <div id="footer-slot"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-api.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/wishlist.js"></script>
</body>
</html>
