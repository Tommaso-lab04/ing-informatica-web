<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — Eco-Nomico</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="shop" data-theme="light">

    <div id="navbar-slot"></div>

    <main class="container py-4">
        <h1 class="section-title">Catalogo prodotti</h1>

        <div class="row">
            <aside class="col-lg-3 mb-4">
                <div class="filters">
                    <h3>Filtri</h3>

                    <div class="mb-3">
                        <label for="search" class="form-label">Ricerca</label>
                        <input type="search" id="search" class="form-control"
                               placeholder="Cerca per nome...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <div id="category-filters"></div>
                    </div>

                    <div class="mb-3">
                        <label for="maxPrice" class="form-label">
                            Prezzo max: <span id="maxPriceVal">100</span>€
                        </label>
                        <input type="range" id="maxPrice" class="form-range"
                               min="0" max="100" step="1" value="100">
                    </div>

                    <button id="reset-filters" class="btn-eco-outline w-100">
                        Reimposta filtri
                    </button>
                </div>
            </aside>

            <section class="col-lg-9">
                <div id="product-count" class="text-muted-eco mb-3"></div>
                <div id="product-grid" class="row g-4 product-grid"></div>
            </section>
        </div>
    </main>

    <!-- Modale dettaglio prodotto: riempita dinamicamente da shop.js -->
    <div id="product-modal" class="d-none"></div>

    <div id="footer-slot"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-api.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
