<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Nomico</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home" data-theme="light">

    <div id="navbar-slot"></div>

    <main>
        <section class="hero">
            <h1 class="hero__title">Consuma meno, consuma meglio</h1>
            <p class="hero__subtitle">
                Scopri prodotti eco-sostenibili e unisciti a una community
                che condivide idee per ridurre, riutilizzare e riciclare.
            </p>
            <div class="d-flex justify-content-center gap-3 flex-wrap">
                <a href="shop.html" class="btn-eco">Esplora lo shop</a>
                <a href="community.html" class="btn-eco-outline">Vai alla community</a>
            </div>
        </section>

        <section class="container mt-section">
            <h2 class="section-title">Prodotti in evidenza</h2>
            <div id="featured-products" class="row g-4 product-grid"></div>
            <div class="text-center mt-4">
                <a href="shop.html" class="btn-eco-outline">Vedi tutto il catalogo</a>
            </div>
        </section>

        <section class="container mt-section">
            <h2 class="section-title">Ultime idee dalla community</h2>
            <div id="latest-posts" class="posts-list"></div>
            <div class="text-center mt-3">
                <a href="community.html" class="btn-eco-outline">Leggi tutti i post</a>
            </div>
        </section>
    </main>

    <div id="footer-slot"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-api.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
