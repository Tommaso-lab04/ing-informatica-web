<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Eco-Nomico</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="admin" data-theme="light">

    <div id="navbar-slot"></div>

    <main class="container py-4">
        <h1 class="section-title">Pannello amministrativo</h1>

        <div id="admin-guest" class="d-none text-center py-5">
            <p class="lead">Accesso riservato agli amministratori.</p>
            <a href="login.html" class="btn-eco">Accedi</a>
        </div>

        <div id="admin-content" class="d-none">

            // Tabs di navigazione 
            <ul class="nav nav-tabs mb-4" id="admin-tabs">
                <li class="nav-item"><a class="nav-link active" href="#dashboard" data-tab="dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="#products" data-tab="products">Prodotti</a></li>
                <li class="nav-item"><a class="nav-link" href="#orders" data-tab="orders">Ordini</a></li>
                <li class="nav-item"><a class="nav-link" href="#users" data-tab="users">Utenti</a></li>
                <li class="nav-item"><a class="nav-link" href="#coupons" data-tab="coupons">Coupon</a></li>
                <li class="nav-item"><a class="nav-link" href="#log" data-tab="log">Log</a></li>
            </ul>

            // Pannelli 
            <section id="tab-dashboard" class="admin-tab-panel">
                <h2>Riepilogo</h2>
                <div id="dashboard-cards" class="row g-3 mb-4"></div>
                <div class="row">
                    <div class="col-md-6">
                        <h3>Top prodotti</h3>
                        <div id="dashboard-top-products"></div>
                    </div>
                    <div class="col-md-6">
                        <h3>Stock basso</h3>
                        <div id="dashboard-low-stock"></div>
                    </div>
                </div>
            </section>

            <section id="tab-products" class="admin-tab-panel d-none">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="m-0">Prodotti</h2>
                    <button id="btn-new-product" class="btn-eco">+ Nuovo prodotto</button>
                </div>
                <div id="products-table"></div>
            </section>

            <section id="tab-orders" class="admin-tab-panel d-none">
                <h2>Ordini</h2>
                <div id="orders-table"></div>
            </section>

            <section id="tab-users" class="admin-tab-panel d-none">
                <h2>Utenti</h2>
                <div id="users-table"></div>
            </section>

            <section id="tab-coupons" class="admin-tab-panel d-none">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="m-0">Coupon</h2>
                    <button id="btn-new-coupon" class="btn-eco">+ Nuovo coupon</button>
                </div>
                <div id="coupons-table"></div>
            </section>

            <section id="tab-log" class="admin-tab-panel d-none">
                <h2>Log azioni amministrative</h2>
                <div id="log-table"></div>
            </section>

        </div>
    </main>

    <div id="footer-slot"></div>

    // Modale generica 
    <div id="modal" class="d-none"
         style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1050;
                display:flex;align-items:center;justify-content:center;">
        <div style="background:var(--color-surface);color:var(--color-text);
                    padding:1.5rem;border-radius:var(--radius);
                    min-width:320px;max-width:600px;width:90%;">
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-api.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
