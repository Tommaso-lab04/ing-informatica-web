<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi — Eco-Nomico</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login" data-theme="light">

    <div id="navbar-slot"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="filters">
                    <h2 id="form-title" class="text-center mb-4">Accedi</h2>

                    <form id="login-form">
                        <div class="mb-3">
                            <label for="login-username" class="form-label">
                                Username o email
                            </label>
                            <input type="text" id="login-username" class="form-control"
                                   required minlength="3" placeholder=" ">
                        </div>
                        <div class="mb-3">
                            <label for="login-password" class="form-label">Password</label>
                            <input type="password" id="login-password" class="form-control"
                                   required minlength="4" placeholder=" ">
                        </div>
                        <div id="login-error" class="alert alert-danger d-none"></div>
                        <button type="submit" class="btn-eco w-100">Accedi</button>
                        <p class="text-center mt-3 mb-0">
                            Non hai un account?
                            <a href="#" id="show-register">Registrati</a>
                        </p>
                    </form>

                    <form id="register-form" class="d-none">
                        <div class="mb-3">
                            <label for="reg-username" class="form-label">Username</label>
                            <input type="text" id="reg-username" class="form-control"
                                   required minlength="3" maxlength="30" placeholder=" ">
                        </div>
                        <div class="mb-3">
                            <label for="reg-email" class="form-label">Email</label>
                            <input type="email" id="reg-email" class="form-control"
                                   required placeholder=" ">
                        </div>
                        <div class="mb-3">
                            <label for="reg-password" class="form-label">Password</label>
                            <input type="password" id="reg-password" class="form-control"
                                   required minlength="4" placeholder=" ">
                            <small class="text-muted-eco">Minimo 4 caratteri</small>
                        </div>
                        <div id="register-error" class="alert alert-danger d-none"></div>
                        <button type="submit" class="btn-eco w-100">Crea account</button>
                        <p class="text-center mt-3 mb-0">
                            Hai già un account?
                            <a href="#" id="show-login">Accedi</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-slot"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-api.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
