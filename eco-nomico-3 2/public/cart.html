<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrello — Eco-Nomico</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cart" data-theme="light">

    <div id="navbar-slot"></div>

    <main class="container py-4">
        <h1 class="section-title">Il tuo carrello</h1>

        <div id="cart-empty" class="d-none text-center py-5">
            <p class="lead text-muted-eco">Il tuo carrello è vuoto 🛒</p>
            <a href="shop.html" class="btn-eco">Vai allo shop</a>
        </div>

        <div id="cart-content" class="row d-none">
            <section class="col-lg-8">
                <div id="cart-items"></div>
            </section>

            <aside class="col-lg-4">
                <div class="filters">
                    <h3>Riepilogo</h3>
                    <p class="d-flex justify-content-between mb-1">
                        <span>Subtotale</span>
                        <strong id="cart-subtotal">€ 0.00</strong>
                    </p>
                    <p id="cart-discount-row" class="d-flex justify-content-between mb-1 d-none" style="color: var(--color-primary);">
                        <span id="cart-discount-label">Sconto</span>
                        <strong id="cart-discount">− € 0.00</strong>
                    </p>
                    <p class="d-flex justify-content-between">
                        <span>Totale</span>
                        <strong id="cart-total">€ 0.00</strong>
                    </p>
                    <hr>
                    <div class="mb-3">
                        <label for="coupon-input" class="form-label">Hai un codice coupon?</label>
                        <div class="d-flex gap-2">
                            <input type="text" id="coupon-input" class="form-control"
                                   placeholder="Es. WELCOME10" autocomplete="off">
                            <button type="button" id="coupon-apply"
                                    class="btn btn-outline-secondary">Applica</button>
                        </div>
                        <div id="coupon-msg" class="small mt-1"></div>
                    </div>
                    <hr>
                    <div id="checkout-login" class="d-none">
                        <p class="text-muted-eco">Accedi per completare l'ordine.</p>
                        <a href="login.html" class="btn-eco w-100 text-center">Accedi</a>
                    </div>
                    <form id="checkout-form" class="d-none">
                        <h4>Indirizzo di spedizione</h4>
                        <div class="mb-2">
                            <label for="ship-street" class="form-label">Via</label>
                            <input type="text" id="ship-street" class="form-control"
                                   required minlength="5" placeholder=" ">
                        </div>
                        <div class="mb-2">
                            <label for="ship-city" class="form-label">Città</label>
                            <input type="text" id="ship-city" class="form-control"
                                   required minlength="2" placeholder=" ">
                        </div>
                        <div class="mb-3">
                            <label for="ship-zip" class="form-label">CAP</label>
                            <input type="text" id="ship-zip" class="form-control" required
                                   pattern="[0-9]{5}" title="5 cifre" placeholder=" ">
                        </div>
                        <div id="checkout-error" class="alert alert-danger d-none"></div>
                        <button type="submit" class="btn-eco w-100">Conferma ordine</button>
                    </form>
                </div>
            </aside>
        </div>

        <div id="order-success" class="d-none text-center py-5">
            <h2 style="color: var(--color-primary);">✅ Ordine confermato!</h2>
            <p class="lead">Grazie per il tuo ordine sostenibile.</p>
            <p>Codice ordine: <code id="order-id"></code></p>
            <a href="shop.html" class="btn-eco">Continua gli acquisti</a>
        </div>
    </main>

    <div id="footer-slot"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-api.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
