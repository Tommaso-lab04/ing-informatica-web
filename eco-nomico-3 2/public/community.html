<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community — Eco-Nomico</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="community" data-theme="light">

    <div id="navbar-slot"></div>

    <main class="container py-4">
        <h1 class="section-title">Community</h1>
        <p class="text-muted-eco mb-4">
            Condividi le tue idee per riciclare, ridurre e salvaguardare il pianeta.
        </p>

        <div class="row">
            <aside class="col-lg-4 order-lg-2 mb-4">
                <div class="filters">
                    <h3>Nuova idea</h3>
                    <div id="new-post-login" class="d-none">
                        <p class="text-muted-eco">Per pubblicare devi essere loggato.</p>
                        <a href="login.html" class="btn-eco w-100 text-center">Accedi</a>
                    </div>
                    <form id="new-post-form" class="d-none">
                        <div class="mb-2">
                            <label for="post-title" class="form-label">Titolo</label>
                            <input type="text" id="post-title" class="form-control"
                                   placeholder="Il tuo titolo..." required
                                   minlength="5" maxlength="120">
                        </div>
                        <div class="mb-2">
                            <label for="post-content" class="form-label">Contenuto</label>
                            <textarea id="post-content" class="form-control" rows="5"
                                      placeholder="Scrivi qui la tua idea..." required
                                      minlength="20"></textarea>
                        </div>
                        <div class="mb-2">
                            <label for="post-tags" class="form-label">
                                Tag (separati da virgola, max 5)
                            </label>
                            <input type="text" id="post-tags" class="form-control"
                                   placeholder="riciclo, casa, plastica">
                        </div>
                        <div id="post-error" class="alert alert-danger d-none"></div>
                        <button type="submit" class="btn-eco w-100">Pubblica</button>
                    </form>
                </div>
            </aside>

            <section class="col-lg-8 order-lg-1">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div id="posts-count" class="text-muted-eco"></div>
                    <select id="sort-select" class="form-select w-auto">
                        <option value="recent">Più recenti</option>
                        <option value="popular">Più popolari</option>
                    </select>
                </div>
                <div id="posts-list" class="posts-list"></div>
            </section>
        </div>
    </main>

    <div id="footer-slot"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-api.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/community.js"></script>
</body>
</html>
